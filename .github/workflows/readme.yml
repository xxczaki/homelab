name: Update README

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "scripts/generate-apps-table.sh"

jobs:
  update-apps-table:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate applications table
        run: |
          chmod +x scripts/generate-apps-table.sh
          ./scripts/generate-apps-table.sh

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: update applications table in readme"
          file_pattern: readme.md
          commit_user_name: Antoni Kępiński
          commit_user_email: 22645979+xxczaki@users.noreply.github.com
          commit_author: Antoni Kępiński <22645979+xxczaki@users.noreply.github.com>

apiVersion: v1
kind: ServiceAccount
metadata:
  name: upgrade-scheduler
  namespace: system-upgrade
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: upgrade-scheduler
  namespace: system-upgrade
rules:
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    resourceNames: ["system-upgrade-controller"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: upgrade-scheduler
  namespace: system-upgrade
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: upgrade-scheduler
subjects:
  - kind: ServiceAccount
    name: upgrade-scheduler
    namespace: system-upgrade
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: upgrade-window-start
  namespace: system-upgrade
spec:
  schedule: "0 5 * * 0"
  timeZone: Europe/Warsaw
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: upgrade-scheduler
          containers:
            - name: kubectl
              image: bitnami/kubectl:1.33
              command: ["kubectl", "scale", "deployment/system-upgrade-controller", "--replicas=1", "-n", "system-upgrade"]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
          restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: upgrade-window-end
  namespace: system-upgrade
spec:
  schedule: "0 6 * * 0"
  timeZone: Europe/Warsaw
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: upgrade-scheduler
          containers:
            - name: kubectl
              image: bitnami/kubectl:1.33
              command: ["kubectl", "scale", "deployment/system-upgrade-controller", "--replicas=0", "-n", "system-upgrade"]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
          restartPolicy: OnFailure

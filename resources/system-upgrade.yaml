apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: system-upgrade
  namespace: system-upgrade
spec:
  project: default
  source:
    repoURL: https://github.com/xxczaki/homelab
    path: system-upgrade
    targetRevision: HEAD
  destination:
    server: "https://kubernetes.default.svc"
    namespace: system-upgrade
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: system-upgrade-controller
      namespace: system-upgrade
      jsonPointers:
        - /spec/replicas

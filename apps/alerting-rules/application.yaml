apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alerting-rules
  namespace: monitoring
spec:
  project: default
  source:
    repoURL: https://github.com/xxczaki/homelab
    targetRevision: main
    path: apps/alerting-rules/resources
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

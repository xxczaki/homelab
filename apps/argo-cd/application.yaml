apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-cd
  namespace: argo-cd
spec:
  project: default
  source:
    chart: argo-cd
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 9.4.15
    helm:
      valuesObject:
        configs:
          params:
            server.insecure: true
            application.namespaces: discord-bot, tailscale, pi-hole, monitoring, longhorn, kube-system, openclaw-system, system-upgrade
          secret:
            createSecret: false
          cm:
            timeout.reconciliation: 0s

        controller:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 1Gi

        dex:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi

        redis:
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 128Mi

        repoServer:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 512Mi

        notifications:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi

        server:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          extraArgs:
            - --enable-gzip
          ingress:
            enabled: true
            ingressClassName: tailscale
            annotations:
              tailscale.com/funnel: "true"
            hostname: argo-cd
            hosts:
              - argo-cd
            extraTls:
              - hosts:
                - argo-cd
            https: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argo-cd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
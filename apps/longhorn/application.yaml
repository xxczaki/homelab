apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: longhorn
spec:
  project: default
  sources:
    - chart: longhorn
      repoURL: https://charts.longhorn.io/
      targetRevision: 1.11.1
      helm:
        valuesObject:
          defaultSettings:
            allowCollectingLonghornUsageMetrics: false
            backupTarget: s3://homelab-xxczaki-longhorn-backups@eu-central-003/
            backupTargetCredentialSecret: longhorn-backblaze-b2

          longhornManager:
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi

          preUpgradeChecker:
            jobEnabled: false

          persistence:
            defaultClassReplicaCount: 1

          ingress:
            enabled: true
            ingressClassName: tailscale
            host: longhorn
            hosts:
              - longhorn
            tls:
              - hosts:
                - longhorn
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: openclaw-system
spec:
  image:
    tag: "2026.3.23-2"
  envFrom:
    - secretRef:
        name: openclaw-api-keys
  gateway:
    controlUiOrigins:
      - "https://openclaws.tail12a84.ts.net"
      - "http://localhost:18789"
      - "http://127.0.0.1:18789"
  config:
    mergeMode: overwrite
    raw:
      gateway:
        trustedProxies:
          - "10.42.0.0/24"
        controlUi:
          allowedOrigins:
            - "https://openclaws.tail12a84.ts.net"
      channels:
        discord:
          enabled: true
          token: "${DISCORD_BOT_TOKEN}"
          groupPolicy: allowlist
          streaming: "block"
      agents:
        defaults:
          model:
            primary: "anthropic/claude-opus-4-6"
          heartbeat:
            every: "0m"
  storage:
    persistence:
      enabled: true
      size: 10Gi
  autoUpdate:
    enabled: false
  selfConfigure:
    enabled: false
  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          prometheus: kube-prometheus
  security:
    networkPolicy:
      allowedIngressNamespaces:
        - tailscale
      additionalEgress:
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: tailscale
          ports:
            - port: 22
              protocol: TCP
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kube-system
          ports:
            - port: 8080
              protocol: TCP
  networking:
    ingress:
      enabled: true
      className: tailscale
      hosts:
        - host: ""
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - openclaws
  extraVolumes:
    - name: extra-bin
      emptyDir: {}
    - name: claude-code
      emptyDir: {}
    - name: home
      emptyDir: {}
    - name: ha-ssh-key
      secret:
        secretName: openclaw-ha-ssh-key
        defaultMode: 0600
  extraVolumeMounts:
    - name: extra-bin
      mountPath: /usr/local/bin/gh
      subPath: gh
    - name: extra-bin
      mountPath: /usr/local/bin/kubeseal
      subPath: kubeseal
    - name: claude-code
      mountPath: /opt/claude-code
    - name: home
      mountPath: /home/openclaw
    - name: ha-ssh-key
      mountPath: /etc/ssh/openclaw
      readOnly: true
  env:
    - name: PATH
      value: "/opt/claude-code/node_modules/.bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  initContainers:
    - name: cleanup-clobbered-configs
      image: alpine:3.21
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "Cleaning up clobbered config files..."
          COUNT=$(find /data -maxdepth 1 -name "openclaw.json.clobbered*" | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            find /data -maxdepth 1 -name "openclaw.json.clobbered*" -delete
            echo "Deleted $COUNT clobbered config files."
          else
            echo "No clobbered files found."
          fi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: data
          mountPath: /data
    - name: install-kubeseal
      image: alpine:3.21
      command: ["/bin/sh", "-c"]
      args:
        - |
          wget -qO /tmp/kubeseal.tar.gz https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.29.0/kubeseal-0.29.0-linux-arm64.tar.gz &&
          tar -xzf /tmp/kubeseal.tar.gz -C /tmp &&
          cp /tmp/kubeseal /extra-bin/kubeseal &&
          chmod +x /extra-bin/kubeseal
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: extra-bin
          mountPath: /extra-bin
    - name: install-gh
      image: alpine:3.21
      command: ["/bin/sh", "-c"]
      args:
        - |
          wget -qO /tmp/gh.tar.gz https://github.com/cli/cli/releases/download/v2.87.3/gh_2.87.3_linux_arm64.tar.gz &&
          tar -xzf /tmp/gh.tar.gz -C /tmp &&
          cp /tmp/gh_2.87.3_linux_arm64/bin/gh /extra-bin/gh &&
          chmod +x /extra-bin/gh
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: extra-bin
          mountPath: /extra-bin
    - name: install-claude-code
      image: node:24-slim
      command: ["/bin/sh", "-c"]
      args:
        - npm install --prefix /opt/claude-code @anthropic-ai/claude-code
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: claude-code
          mountPath: /opt/claude-code
    - name: setup-claude-code-config
      image: node:24-slim
      command: ["/bin/sh", "-c"]
      args:
        - |
          mkdir -p /home/openclaw/.claude
          cat > /home/openclaw/.claude/.config.json << 'CONF'
          {
            "theme": "dark",
            "hasCompletedOnboarding": true,
            "customApiKeyResponses": {
              "approved": [],
              "rejected": []
            },
            "projects": {
              "/": { "hasTrustDialogAccepted": true },
              "/tmp": { "hasTrustDialogAccepted": true },
              "/home/openclaw": { "hasTrustDialogAccepted": true }
            }
          }
          CONF
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            KEY_SUFFIX=$(echo -n "$ANTHROPIC_API_KEY" | tail -c 20)
            node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('/home/openclaw/.claude/.config.json', 'utf8'));
              cfg.customApiKeyResponses.rejected = ['${KEY_SUFFIX}'];
              fs.writeFileSync('/home/openclaw/.claude/.config.json', JSON.stringify(cfg, null, 2));
            "
          fi
          cat > /home/openclaw/.claude/settings.json << 'CONF'
          {
            "skipDangerousModePermissionPrompt": true
          }
          CONF
          echo "Claude Code config seeded."
      envFrom:
        - secretRef:
            name: openclaw-api-keys
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: home
          mountPath: /home/openclaw
  chromium:
    enabled: true
    image:
      repository: chromedp/headless-shell
      tag: stable
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

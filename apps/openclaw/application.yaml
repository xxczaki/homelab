apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw
  namespace: openclaw-system
spec:
  project: default
  source:
    repoURL: https://github.com/xxczaki/homelab
    targetRevision: main
    path: apps/openclaw/resources
  destination:
    server: "https://kubernetes.default.svc"
    namespace: openclaw-system
  ignoreDifferences:
    - group: ""
      kind: Service
      name: raspberrypi
      jsonPointers:
        - /spec/externalName
    - group: ""
      kind: Service
      name: homeassistant
      jsonPointers:
        - /spec/externalName
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: "pi-hole-pool"
spec:
  blocks:
    - cidr: "10.10.10.53/32"
    - cidr: "fd2b:55e1:1a4c:10::53/128"  # ULA for Pi-hole IPv6 DNS; L2/NDP-announced on eth0, advertised to LAN clients via UniFi RDNSS
  serviceSelector:
    matchLabels:
      app: pihole
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: kube-system
spec:
  project: default
  source:
    chart: cilium
    repoURL: https://helm.cilium.io/
    # PINNED to 1.19.1 — do NOT bump on this node until it runs a BTF-enabled kernel.
    # Cilium >=1.19.2 made the IPv6 SNAT helpers global BPF functions
    # (cilium/cilium#44544, #45007); the verifier can only validate them with
    # vmlinux BTF, which Raspberry Pi OS kernels don't ship (no CONFIG_DEBUG_INFO_BTF).
    # Result on >=1.19.2: cilium_host fails to load tail_handle_snat_fwd_ipv6, the
    # LoadBalancer/L2 datapath can't program, and Pi-hole's LB IP goes unreachable
    # (cilium/cilium#45224). Cilium now REQUIRES BTF (#46063; inline fallback #45626
    # was closed), so the durable fix is a BTF kernel (e.g. Ubuntu for Pi), not a
    # Cilium upgrade. 1.19.1 predates the change and keeps IPv6 LB + L2 working.
    targetRevision: 1.19.1
    helm:
      valuesObject:
        k8sServiceHost: 10.10.10.10
        k8sServicePort: 6443
        ipv4:
          enabled: true
        ipv6:
          enabled: true
        l2announcements:
          enabled: true
        # Raspberry Pi OS ships a malformed vmlinux BTF (raspberrypi/linux#6622),
        # which makes the verifier reject tail_handle_snat_fwd_ipv6 in the
        # bpf_overlay program collection. Disabling the vxlan overlay sidesteps
        # the broken codepath while preserving IPv6 + kubeProxyReplacement.
        routingMode: native
        ipv4NativeRoutingCIDR: 10.42.0.0/24
        ipv6NativeRoutingCIDR: 2001:cafe:42::/64
        bpf:
          # Belt-and-braces: the same BTF bug would also break the IPv6 SNAT
          # codepath if BPF masquerade were re-enabled. Iptables masquerade
          # stays (same BTF bug, cilium/cilium#45224 — see the targetRevision pin above).
          masquerade: false
        kubeProxyReplacement: true
        socketLB:
          hostNamespaceOnly: true
        extraConfig:
          enable-ipv6-ndp: "true"
          ipv6-mcast-device: "eth0"
          ipv6-service-range: "2001:cafe:43::/112"
        operator:
          replicas: 1
        # Hubble: egress/DNS flow visibility. Used to harvest the real set of
        # destinations wicek reaches before enforcing an FQDN egress allowlist.
        # Relay enabled for `hubble observe`; UI disabled to spare RPi memory.
        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: false
          metrics:
            enabled:
              - dns:query
              - drop
              - flow
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
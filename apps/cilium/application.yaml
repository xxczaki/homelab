apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: kube-system
spec:
  project: default
  source:
    chart: cilium
    repoURL: https://helm.cilium.io/
    targetRevision: 1.19.4
    helm:
      valuesObject:
        k8sServiceHost: 10.10.10.10
        k8sServicePort: 6443
        ipv4:
          enabled: true
        ipv6:
          enabled: true
        l2announcements:
          enabled: true
        # Raspberry Pi OS ships a malformed vmlinux BTF (raspberrypi/linux#6622),
        # which makes the verifier reject tail_handle_snat_fwd_ipv6 in the
        # bpf_overlay program collection. Disabling the vxlan overlay sidesteps
        # the broken codepath while preserving IPv6 + kubeProxyReplacement.
        routingMode: native
        ipv4NativeRoutingCIDR: 10.42.0.0/24
        ipv6NativeRoutingCIDR: 2001:cafe:42::/64
        bpf:
          # Belt-and-braces: the same BTF bug would also break the IPv6 SNAT
          # codepath if BPF masquerade were re-enabled. Iptables masquerade
          # stays until raspberrypi/linux#6622 / cilium/cilium#45626 land.
          masquerade: false
        kubeProxyReplacement: true
        socketLB:
          hostNamespaceOnly: true
        extraConfig:
          enable-ipv6-ndp: "true"
          ipv6-mcast-device: "eth0"
          ipv6-service-range: "2001:cafe:43::/112"
        operator:
          replicas: 1
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
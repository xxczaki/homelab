apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wicek-chart
  namespace: wicek
spec:
  project: default
  source:
    chart: wicek
    repoURL: https://xxczaki.github.io/charts/
    targetRevision: 0.1.142
    helm:
      valuesObject:
        secrets:
          oauthToken:
            name: wicek-secrets
            key: CLAUDE_CODE_OAUTH_TOKEN
          discordToken:
            name: wicek-secrets
            key: DISCORD_BOT_TOKEN
          ghToken:
            name: wicek-secrets
            key: GH_TOKEN
          grafanaApiKey:
            name: wicek-secrets
            key: GRAFANA_API_KEY
          haToken:
            name: wicek-secrets
            key: HA_TOKEN
          appleId:
            name: wicek-secrets
            key: APPLE_ID
          appleAppPassword:
            name: wicek-secrets
            key: APPLE_APP_PASSWORD
          unifiUsername:
            name: wicek-secrets
            key: UNIFI_USERNAME
          unifiPassword:
            name: wicek-secrets
            key: UNIFI_PASSWORD
          haSSHKey:
            name: wicek-ha-ssh-key
            key: id_ed25519
        env:
          clientId: "1479530749354053833"
          allowedUserIds: "349213466743013376"
        persistence:
          storageClass: longhorn
        chromium:
          enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: wicek
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

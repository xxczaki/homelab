apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/rancher/system-upgrade-controller?ref=v0.19.1
  - plan.yaml
  - scheduler.yaml

images:
  - name: rancher/system-upgrade-controller
    newTag: v0.19.0

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: system-upgrade-controller
        namespace: system-upgrade
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: system-upgrade-controller
                resources:
                  requests:
                    cpu: 25m
                    memory: 64Mi
                  limits:
                    memory: 128Mi
